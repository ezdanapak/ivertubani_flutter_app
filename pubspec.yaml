name: ivertubani
description: "ივერთუბნის ინტერაქტიული რუკა — Tbilisi Ivertubani district map."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.0
  geolocator: ^14.0.2
  cupertino_icons: ^1.0.8
  url_launcher: ^6.2.5
  dynamic_color: ^1.7.0
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.6
  shared_preferences: ^2.3.0
  dio: ^5.4.1
  dio_smart_retry: ^6.0.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_file_store: ^1.2.2
  flutter_map_cache: ^1.5.2
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data.gpkg
    - assets/data.geojson
    - assets/icon/icon.png
