<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ივერთუბნის ინტერაქტიული რუკა">

  <!-- Meta tags to prevent aggressive caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ივერთუბანი">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ივერთუბნის რუკა</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #3f51b5;
    }
  </style>
</head>
<body>
  <script>
    // ეს სკრიპტი აიძულებს ბრაუზერს განაახლოს Service Worker-ი მომენტალურად
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('flutter_service_worker.js?v=' + new Date().getTime());
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
